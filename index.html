/* ===========================================================================
 *  4-B) 용돈 기입장 (기간 설정 + 수입/지출 원장)
 * =======================================================================*/
function renderAllowanceBook(root) {
  const bucket = ensureStudentBucket(view.studentName);
  const al = bucket.allowance;

  // 기간이 비어 있으면 기간 설정 화면 먼저
  if (!al.period.start || !al.period.end) {
    renderAllowanceSetup(root);
    return;
  }

  const inPeriod = al.entries.filter(e => e.date >= al.period.start && e.date <= al.period.end);
  const sorted = [...inPeriod].sort((a,b)=>a.date.localeCompare(b.date) || a.id.localeCompare(b.id));

  let bal = 0;
  const rows = sorted.map((e, i) => {
    const signed = e.kind === 'income' ? Number(e.amount||0) : -Number(e.amount||0);
    bal += signed;
    const kindBadge = e.kind === 'income'
      ? `<span class="kind-tag pos">수입<span class="sub"> · ${e.incomeType==='special'?'특별':'정기'}</span></span>`
      : `<span class="kind-tag neg">지출</span>`;
    const descCell = e.kind === 'expense' && e.category
      ? `${escapeHTML(e.description)} <span style="color:var(--primary);font-size:0.7em;background:var(--primary-soft);padding:2px 8px;border-radius:99px;margin-left:4px;">${escapeHTML(e.category)}</span>`
      : escapeHTML(e.description);
    const necessityCell = e.kind === 'expense'
      ? renderStars(e.necessity, { small: true })
      : '';
    const checked = selection.allow.has(e.id) ? 'checked' : '';
    return `
      <tr class="${e.confirmed?'confirmed':''}">
        <td style="width:2em;"><input type="checkbox" ${e.confirmed?'disabled':''} ${checked} onchange="toggleAllowanceSelect('${e.id}', this.checked)"></td>
        <td class="num" style="width:2.2em;">${String(i+1).padStart(2,'0')}</td>
        <td class="date-col">${e.date}</td>
        <td class="col-desc" style="text-align:left;">${descCell}</td>
        <td>${kindBadge}</td>
        <td class="num ${e.kind==='income'?'pos':'neg'}">${e.kind==='income'?'+':'-'}${fmtMoney(e.amount)}</td>
        <td class="num" style="color:${bal>=0?'var(--ink-navy)':'var(--negative)'};font-weight:600;">${fmtMoney(bal)}</td>
        <td style="width:5em;">${necessityCell}</td>
        <td style="width:4em;">${e.confirmed ? stampFor(e.id) : '<span style="color:var(--text-muted);font-size:0.8em;">확인대기</span>'}</td>
      </tr>`;
  }).join('');

  const totalIncome  = inPeriod.filter(e=>e.kind==='income') .reduce((s,e)=>s+Number(e.amount||0),0);
  const totalExpense = inPeriod.filter(e=>e.kind==='expense').reduce((s,e)=>s+Number(e.amount||0),0);

  const otherBtn = state.settings.savingsEnabled
    ? `<button class="btn" onclick="openBook('savings')">적립통장</button>` : '';
  root.innerHTML = `
    ${topBar(`
      <button class="btn btn-ghost" onclick="view.current='bookSelect';render()">‹ 통장 선택</button>
      ${otherBtn}
      <button class="btn" onclick="view.current='stats';render()">통계 보기</button>
      <button class="btn btn-ghost" onclick="logout()">로그아웃</button>
    `)}

    <h1>용돈기입장</h1>

    <div class="account-strip">
      <div class="field"><span class="label">예금주</span><span class="value">${escapeHTML(view.studentName)}</span></div>
      <div class="field"><span class="label">통장종류</span><span class="value">자유입출금</span></div>
      <div class="field"><span class="label">기간</span><span class="value num" style="font-size:0.62em;">${al.period.start} ~ ${al.period.end}</span></div>
      <div class="field"><span class="label">잔액</span><span class="value num">₩ ${fmtMoney(bal)}</span></div>
    </div>

    <div class="stat-grid" style="grid-template-columns: minmax(0, 1.4fr) minmax(0, 1.4fr) minmax(0, 1.4fr) minmax(0, 0.7fr);">
      <div class="stat-tile tile-income"><div class="num pos">＋${fmtMoney(totalIncome)}</div><div class="label">수입 합계</div></div>
      <div class="stat-tile tile-expense"><div class="num neg">－${fmtMoney(totalExpense)}</div><div class="label">지출 합계</div></div>
      <div class="stat-tile tile-balance"><div class="num">${fmtMoney(bal)}</div><div class="label">현재 잔액</div></div>
      <div class="stat-tile tile-count"><div class="num">${inPeriod.length}</div><div class="label">사용 건수</div></div>
    </div>

    <div class="row" style="justify-content:flex-end;margin:10px 0 0;">
      <button class="btn" onclick="changeAllowancePeriod()" style="background:#F08C00;color:white;border-color:#F08C00;font-weight:700;font-size:1em;padding:12px 22px;box-shadow:0 4px 12px rgba(240,140,0,0.32);">
        📅 기간 · 지출 계획 변경
      </button>
    </div>

    <h2>새 사용 내역 입력</h2>
    <div class="activity-card">
      <div class="row" style="align-items: flex-end; gap: 12px;">
        <label>구분
          <select class="input" id="alKind" onchange="toggleIncomeType()">
            <option value="income">수입</option>
            <option value="expense">지출</option>
          </select>
        </label>
        <label id="alIncomeTypeWrap">수입구분
          <select class="input" id="alIncomeType">
            <option value="fixed">정기 (용돈 등)</option>
            <option value="special">특별 (세뱃돈, 상금 등)</option>
          </select>
        </label>
        <label>일자 <input class="input" type="date" id="alDate" value="${todayISO()}"></label>
        <label style="flex:1;min-width:180px;">내용
          <input class="input" id="alDesc" placeholder="예) 초콜릿, 샤프, 세뱃돈">
        </label>
        <label id="alCategoryWrap" style="display:none;">분류
          <select class="input" id="alCategory">
            ${EXPENSE_CATEGORIES.map(c=>`<option value="${c}">${c}</option>`).join('')}
          </select>
        </label>
        <label>금액 <input class="input" type="number" id="alAmount" placeholder="0" min="0" style="width:7em;"></label>
        <label id="alNecessityWrap" style="display:none;">필요도
          <span id="alNecessity">${renderStars(0, { onChange: 'setNecessity' })}</span>
        </label>
        <button class="btn btn-primary" onclick="addAllowanceEntry()">＋ 등록</button>
      </div>
      <p style="color:var(--text-muted);font-size:0.85em;margin-top:6px;">지출은 <b>실제 산 물건/내용</b>을 적고, 그게 어떤 <b>분류</b>(간식·문구 등)인지 골라요. 그래프는 분류별로 보입니다.</p>
    </div>

    <div class="bankbook">
      <h3>사용 내역</h3>
      ${sorted.length === 0
        ? '<p style="color:var(--text-muted);text-align:center;padding:24px;">— 사용 내역 없음 —</p>'
        : `<div class="bulk-bar" id="allowBulkBar">
             <span class="selected-count">선택된 항목 없음</span>
             <button class="btn btn-sm btn-danger" onclick="bulkDeleteAllowance()" disabled>선택 항목 삭제</button>
           </div>
           <table>
            <thead><tr>
              <th></th><th>No.</th><th>일자</th><th>내용</th><th>구분</th><th>금액(원)</th><th>잔액(원)</th><th>필요도</th><th>확인</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>`
      }
    </div>
  `;
  // 폼 초기 상태 동기화 (지출이면 카테고리/별점 표시)
  toggleIncomeType();
}

function renderAllowanceSetup(root) {
  const today = todayISO();
  const monthLater = (() => {
    const d = new Date(); d.setMonth(d.getMonth()+1);
    const tz = d.getTimezoneOffset()*60000;
    return new Date(d - tz).toISOString().slice(0,10);
  })();
  const al = ensureStudentBucket(view.studentName).allowance;
  const plan = al._plan || '';
  root.innerHTML = `
    ${topBar(`<button class="btn btn-ghost" onclick="view.current='bookSelect';render()">‹ 통장 선택</button>`)}
    <div style="max-width:680px;margin:24px auto 0;">
      <h1 style="margin-bottom:6px;">용돈기입장 개설</h1>
      <p style="color:var(--text-muted);margin-bottom:20px;">기간을 정하고, <b>이번 기간 동안 어디에 얼마나 쓰고 싶은지 계획</b>도 함께 적어보세요.</p>
      <div class="activity-card">
        <div class="row" style="gap:14px;">
          <label style="flex:1;">시작일 <input class="input" type="date" id="periodStart" value="${today}"></label>
          <label style="flex:1;">종료일 <input class="input" type="date" id="periodEnd" value="${monthLater}"></label>
        </div>
        <label style="display:block;margin-top:14px;">
          나의 지출 계획
          <textarea class="input" id="expensePlan" rows="4" placeholder="예) 간식 5000원, 문구 3000원, 책 2000원 / 꼭 필요한 것만 사기" style="width:100%;resize:vertical;margin-top:6px;">${escapeHTML(plan)}</textarea>
        </label>
        <p style="color:var(--text-muted);font-size:0.85em;margin-top:6px;">계획은 결산 화면에서 다시 볼 수 있어요. 마음껏 자유롭게 적어요.</p>
        <div class="right" style="margin-top:14px;">
          <button class="btn btn-primary" onclick="saveAllowancePeriod()">개설하기</button>
        </div>
      </div>
    </div>
  `;
}

async function saveAllowancePeriod() {
  const start = document.getElementById('periodStart').value;
  const end   = document.getElementById('periodEnd').value;
  const plan  = (document.getElementById('expensePlan')?.value || '').trim();
  if (!start || !end) { toast('시작일과 종료일을 모두 골라주세요'); return; }
  if (start > end)   { toast('시작일이 종료일보다 늦어요'); return; }
  const al = ensureStudentBucket(view.studentName).allowance;
  al.period = { start, end };
  al._plan = plan;
  toast('기간과 지출 계획을 저장했어요!');
  render();
  if (isAppsScript) {
    try { await api.setAllowancePeriod(view.studentName, start, end); } catch(e) { toast('시트 저장 실패'); }
    try { await api.setExpensePlan(view.studentName, plan); } catch(e) {}
  }
}
function changeAllowancePeriod() {
  const al = ensureStudentBucket(view.studentName).allowance;
  const plan = al._plan || '';
  openModal(`
    <h2 style="margin-bottom:0;">기간 · 지출 계획 변경</h2>
    <p style="color:var(--text-muted);margin:6px 0 12px;">기간을 바꿔도 이전 기록은 사라지지 않아요 — 기간 안의 기록만 보입니다.</p>
    <div class="row">
      <label>시작일 <input class="input" type="date" id="pStart" value="${al.period.start}"></label>
      <label>종료일 <input class="input" type="date" id="pEnd"   value="${al.period.end}"></label>
    </div>
    <label style="display:block;margin-top:12px;">
      나의 지출 계획
      <textarea class="input" id="pPlan" rows="4" style="width:100%;resize:vertical;margin-top:6px;">${escapeHTML(plan)}</textarea>
    </label>
    <div class="right" style="margin-top:12px;">
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="doChangePeriod()">저장</button>
    </div>
  `);
}
async function doChangePeriod() {
  const start = document.getElementById('pStart').value;
  const end   = document.getElementById('pEnd').value;
  const plan  = (document.getElementById('pPlan')?.value || '').trim();
  if (!start || !end) { toast('날짜를 모두 골라주세요'); return; }
  if (start > end) { toast('시작일이 종료일보다 늦어요'); return; }
  const al = ensureStudentBucket(view.studentName).allowance;
  al.period = { start, end };
  al._plan = plan;
  closeModal();
  toast('저장했어요');
  render();
  if (isAppsScript) {
    try { await api.setAllowancePeriod(view.studentName, start, end); } catch(e) {}
    try { await api.setExpensePlan(view.studentName, plan); } catch(e) {}
  }
}
function toggleIncomeType() {
  const kind = document.getElementById('alKind').value;
  const isIncome = kind === 'income';
  const show = (id, on) => { const el = document.getElementById(id); if (el) el.style.display = on ? '' : 'none'; };
  show('alIncomeTypeWrap', isIncome);
  show('alCategoryWrap', !isIncome);
  show('alNecessityWrap', !isIncome);
  const descInput = document.getElementById('alDesc');
  if (descInput) {
    descInput.placeholder = isIncome
      ? '예) 세뱃돈, 용돈, 상금'
      : '예) 초콜릿, 샤프, 학습지';
  }
}
async function addAllowanceEntry() {
  const al = ensureStudentBucket(view.studentName).allowance;
  const date = document.getElementById('alDate').value;
  const kind = document.getElementById('alKind').value;
  const incomeType = document.getElementById('alIncomeType').value;
  const amount = Number(document.getElementById('alAmount').value);
  const desc = (document.getElementById('alDesc').value || '').trim();
  let category = '';
  let necessity = 0;
  if (kind === 'expense') {
    category = (document.getElementById('alCategory').value || '').trim();
    necessity = _necessityInput || 0;
  }
  if (!date) { toast('날짜를 골라주세요'); return; }
  if (!desc) { toast('실제 사용한 내용을 적어주세요'); return; }
  if (kind === 'expense' && !category) { toast('지출 분류를 골라주세요'); return; }
  if (!amount || amount <= 0) { toast('금액을 0보다 크게 입력해 주세요'); return; }
  if (date < al.period.start || date > al.period.end) {
    toast('기록 기간(' + al.period.start + ' ~ ' + al.period.end + ') 안의 날짜여야 해요');
    return;
  }
  if (kind === 'expense' && necessity === 0) {
    if (!confirm('필요도(별점)를 입력하지 않았어요. 그대로 등록할까요?')) return;
  }
  const e = newAllowanceEntry();
  e.date = date; e.description = desc; e.amount = amount;
  e.kind = kind; e.incomeType = (kind==='income' ? incomeType : 'fixed');
  e.category = category;
  e.necessity = necessity;
  al.entries.push(e);
  _necessityInput = 0;
  toast('기록을 추가했어요!');
  render();
  if (isAppsScript) {
    try {
      const res = await api.saveAllowanceEntry(view.studentName, e);
      e.id = res.id;
    } catch(err) { toast('시트 저장 실패'); }
  }
}
async function deleteAllowanceEntry(id) {
  if (!confirm('이 기록을 삭제할까요?')) return;
  const al = ensureStudentBucket(view.studentName).allowance;
  al.entries = al.entries.filter(e => e.id !== id);
  render();
  if (isAppsScript) {
    try { await api.deleteAllowanceEntry(view.studentName, id); } catch(err) {}
  }
}
function renderActivityList() {
  const bucket = ensureStudentBucket(view.studentName);
  const book = bucket[view.bookType];
  const unit = view.bookType === 'savings' ? '포인트' : '원';

  const html = book.activities.map((a, idx) => {
    if (a.isCommon) {
      // 선생님이 일괄로 지정한 공통 활동 — 학생이 수정·삭제 불가
      return `
        <div class="activity-card" style="background: var(--primary-soft); border-left: 4px solid var(--primary);">
          <div class="row" style="align-items:center;">
            <span style="color:var(--primary);font-weight:800;min-width:28px;text-align:center;">★</span>
            <span style="flex:2;min-width:180px;font-weight:700;color:var(--text);">
              ${escapeHTML(a.name)}
              <span style="font-size:0.75em;color:var(--primary);font-weight:600;margin-left:6px;">선생님이 정한 공통 활동</span>
            </span>
            <span style="color:var(--text-secondary);">기간: ${a.startDate||'-'} ~ ${a.endDate||'-'}</span>
            <span style="color:var(--text);font-weight:700;">${a.points} ${unit}/회</span>
            <span style="color:var(--text-muted);font-size:0.85em;">🔒</span>
          </div>
        </div>`;
    }
    return `
      <div class="activity-card">
        <div class="row">
          <span style="color:var(--gold-foil);font-weight:700;min-width:24px;text-align:center;">${idx+1}.</span>
          <input class="input" placeholder="활동 이름 (예: 책 읽기)" value="${escapeAttr(a.name)}" onchange="updActivity('${a.id}','name',this.value)" style="flex:2;min-width:180px;">
          <label>시작 <input class="input" type="date" value="${a.startDate}" onchange="updActivity('${a.id}','startDate',this.value)"></label>
          <label>종료 <input class="input" type="date" value="${a.endDate}" onchange="updActivity('${a.id}','endDate',this.value)"></label>
          <label>${unit}/회 <input class="input" type="number" value="${a.points}" style="width:90px;" onchange="updActivity('${a.id}','points',this.value)"></label>
          <button class="btn btn-sm btn-danger" onclick="delActivity('${a.id}')">삭제</button>
        </div>
      </div>`;
  }).join('');

  const personalCount = book.activities.filter(a => !a.isCommon).length;
  const commonCount = book.activities.filter(a => a.isCommon).length;
  const hint = commonCount > 0
    ? `<p style="color:var(--text-secondary);font-size:0.85em;margin-top:6px;">선생님이 정한 공통 활동 ${commonCount}개 + 내가 정한 활동 ${personalCount}개</p>`
    : '';
  document.getElementById('activityList').innerHTML = (html || '<p style="color:var(--text-muted);padding:6px 0;">등록된 활동이 없습니다. 아래에서 추가해 주세요.</p>') + hint;
}
function renderBankbookTable(book, unit) {
  const sorted = [...book.records].sort((a,b)=>a.date.localeCompare(b.date) || a.id.localeCompare(b.id));
  let running = 0;
  if (sorted.length === 0) return '<p style="color:var(--text-muted);text-align:center;padding:24px;">— 거래 내역 없음 —</p>';
  const rows = sorted.map((r, i) => {
    running += Number(r.points||0);
    const checked = selection.save.has(r.id) ? 'checked' : '';
    return `
      <tr class="${r.confirmed?'confirmed':''}">
        <td style="width:2em;"><input type="checkbox" ${r.confirmed?'disabled':''} ${checked} onchange="toggleSavingsSelect('${r.id}', this.checked)"></td>
        <td class="num" style="width:2.2em;">${String(i+1).padStart(2,'0')}</td>
        <td class="date-col">${r.date}</td>
        <td class="col-desc">${escapeHTML(r.activityName)}</td>
        <td class="num" style="color:var(--positive);">${fmtMoney(r.points)} ${unit}</td>
        <td class="num" style="color:var(--ink-navy);font-weight:600;">${fmtMoney(running)} ${unit}</td>
        <td style="width:4em;">${r.confirmed
          ? stampFor(r.id)
          : '<span style="color:var(--text-muted);font-size:0.8em;">확인대기</span>'}
        </td>
      </tr>`;
  }).join('');
  return `
    <div class="bulk-bar" id="saveBulkBar">
      <span class="selected-count">선택된 항목 없음</span>
      <button class="btn btn-sm btn-danger" onclick="bulkDeleteSavings()" disabled>선택 항목 삭제</button>
    </div>
    <table>
      <thead><tr>
        <th></th><th>No.</th><th>일자</th><th>내용</th><th>적립 ${unit}</th><th>잔액 ${unit}</th><th>확인</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}
async function addActivity() {
  const book = ensureStudentBucket(view.studentName).savings;
  const personalCount = book.activities.filter(a => !a.isCommon).length;
  if (personalCount >= 5) { toast('내가 정하는 활동은 최대 5개까지요'); return; }
  const a = newActivity();
  book.activities.push(a);
  render();
  if (isAppsScript) {
    try {
      const r = await api.saveSavingsActivity(view.studentName, a);
      a.id = r.id;
    } catch(e) { toast('시트 저장 실패'); }
  }
}
function updActivity(id, field, val) {
  const book = ensureStudentBucket(view.studentName).savings;
  const a = book.activities.find(x=>x.id===id);
  if (!a || a.isCommon) return;
  a[field] = field==='points' ? Number(val) : val;
  if (isAppsScript) {
    safeCall(api.saveSavingsActivity(view.studentName, a)).catch(()=>{});
  }
}
async function delActivity(id) {
  const book = ensureStudentBucket(view.studentName).savings;
  const a = book.activities.find(x=>x.id===id);
  if (!a || a.isCommon) { toast('공통 활동은 선생님만 변경할 수 있어요'); return; }
  if (!confirm('이 활동을 삭제할까요?')) return;
  book.activities = book.activities.filter(x=>x.id!==id);
  render();
  if (isAppsScript) {
    try { await api.deleteSavingsActivity(view.studentName, id); } catch(e) {}
  }
}
async function addRecord() {
  const book = ensureStudentBucket(view.studentName).savings;
  const date = document.getElementById('recDate').value;
  const aid  = document.getElementById('recActivity').value;
  if (!date) { toast('날짜를 골라주세요'); return; }
  const a = book.activities.find(x=>x.id===aid);
  if (!a) { toast('활동을 선택해 주세요'); return; }
  if (!a.name) { toast('활동 이름을 먼저 적어주세요'); return; }
  if (a.startDate && date < a.startDate) { toast('활동 시작 전이에요'); return; }
  if (a.endDate && date > a.endDate)     { toast('활동 기간이 끝났어요'); return; }
  const r = newRecord(a.name, a.points);
  r.date = date;
  book.records.push(r);
  toast('적립이 신청되었습니다. 선생님 확인을 기다려 주세요.');
  render();
  if (isAppsScript) {
    try {
      const res = await api.saveSavingsRecord(view.studentName, r);
      r.id = res.id;
    } catch(e) { toast('시트 저장 실패'); }
  }
}
async function deleteRecord(id) {
  if (!confirm('이 기록을 삭제할까요?')) return;
  const book = ensureStudentBucket(view.studentName).savings;
  book.records = book.records.filter(r=>r.id!==id);
  render();
  if (isAppsScript) {
    try { await api.deleteSavingsRecord(view.studentName, id); } catch(e) {}
  }
}

/* ===========================================================================
 *  5-A) 적립 통장 통계
 * =======================================================================*/
function renderSavingsStats(root) {
  const bucket = ensureStudentBucket(view.studentName);
  const book = bucket.savings;
  const unit = '포인트';

  const total = book.records.reduce((a,r)=>a+Number(r.points||0),0);
  const confirmed = book.records.filter(r=>r.confirmed);
  const confirmedTotal = confirmed.reduce((a,r)=>a+Number(r.points||0),0);
  const waiting = book.records.length - confirmed.length;
  const days = new Set(book.records.map(r=>r.date)).size;

  const byAct = {};
  book.records.forEach(r => {
    byAct[r.activityName] = (byAct[r.activityName] || 0) + Number(r.points||0);
  });
  const max = Math.max(1, ...Object.values(byAct));
  const actRows = Object.entries(byAct)
    .sort((a,b)=>b[1]-a[1])
    .map(([name, val]) => `
      <div style="margin:8px 0;">
        <div class="row space-between"><b>${escapeHTML(name)}</b><span>${val} ${unit}</span></div>
        <div class="bar-wrap"><div class="bar" style="width:${(val/max*100).toFixed(1)}%;"></div></div>
      </div>
    `).join('') || '<p style="color:var(--text-muted);">기록이 없어요</p>';

  root.innerHTML = `
    ${topBar(`
      <button class="btn btn-ghost" onclick="view.current='bankbook';render()">‹ 통장으로</button>
      <button class="btn btn-ghost" onclick="logout()">로그아웃</button>
    `)}
    <h1>적립 결산</h1>
    <div class="stat-grid">
      <div class="stat-tile"><div class="num">${fmtMoney(total)}</div><div class="label">전체 누적 ${unit}</div></div>
      <div class="stat-tile"><div class="num">${fmtMoney(confirmedTotal)}</div><div class="label">확인 ${unit}</div></div>
      <div class="stat-tile"><div class="num">${book.records.length}</div><div class="label">거래 건수</div></div>
      <div class="stat-tile"><div class="num">${waiting}</div><div class="label">확인 대기</div></div>
      <div class="stat-tile"><div class="num">${days}</div><div class="label">실천 일수</div></div>
      <div class="stat-tile"><div class="num">${confirmed.length}</div><div class="label">받은 인장</div></div>
    </div>

    <h2>활동별 적립 ${unit}</h2>
    ${actRows}

    <h2>인장 모음</h2>
    <div style="display:flex;flex-wrap:wrap;gap:20px;padding:10px 4px;">
      ${confirmed.length === 0
        ? '<p style="color:var(--text-muted);">받은 인장이 없습니다. 활동을 실천하고 선생님 확인을 받아보세요.</p>'
        : confirmed.map(r => `
            <div style="text-align:center;">
              ${stampFor(r.id)}
              <div style="font-size:0.78em;color:var(--text-muted);margin-top:6px;">${r.date}<br>${escapeHTML(r.activityName)}</div>
            </div>`).join('')
      }
    </div>
  `;
}

/* ===========================================================================
 *  5-B) 용돈 기입장 통계 (수입/지출 원그래프)
 * =======================================================================*/
function renderAllowanceStats(root) {
  const bucket = ensureStudentBucket(view.studentName);
  const al = bucket.allowance;
  const inPeriod = (al.period.start && al.period.end)
    ? al.entries.filter(e => e.date >= al.period.start && e.date <= al.period.end)
    : al.entries.slice();

  const income  = inPeriod.filter(e=>e.kind==='income');
  const expense = inPeriod.filter(e=>e.kind==='expense');
  const totalIncome  = income.reduce((s,e)=>s+Number(e.amount||0),0);
  const totalExpense = expense.reduce((s,e)=>s+Number(e.amount||0),0);
  const balance = totalIncome - totalExpense;

  const fixed   = income.filter(e=>e.incomeType==='fixed')  .reduce((s,e)=>s+Number(e.amount||0),0);
  const special = income.filter(e=>e.incomeType==='special').reduce((s,e)=>s+Number(e.amount||0),0);

  // 수입과 지출 비교 — 가로형 막대그래프 (글씨가 막대 위에 안 겹치게 양옆 분리)
  const maxVal = Math.max(totalIncome, totalExpense, 1);
  const incomePct = (totalIncome / maxVal) * 100;
  const expensePct = (totalExpense / maxVal) * 100;
  const compareHTML = `
    <div style="padding:8px 0;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
        <div style="width:3em;font-weight:700;color:#1f5a36;">수입</div>
        <div style="flex:1;background:#F0F2F4;height:2em;border-radius:6px;overflow:hidden;">
          <div style="background:#5BDDC0;height:100%;width:${incomePct}%;border-radius:6px 0 0 6px;"></div>
        </div>
        <div class="num pos" style="min-width:6em;text-align:right;font-weight:800;">＋${fmtMoney(totalIncome)}원</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:3em;font-weight:700;color:#8b1a1a;">지출</div>
        <div style="flex:1;background:#F0F2F4;height:2em;border-radius:6px;overflow:hidden;">
          <div style="background:#F4859A;height:100%;width:${expensePct}%;border-radius:6px 0 0 6px;"></div>
        </div>
        <div class="num neg" style="min-width:6em;text-align:right;font-weight:800;">－${fmtMoney(totalExpense)}원</div>
      </div>
    </div>`;

  // 지출 — 카테고리별 합계
  const byCat = {};
  expense.forEach(e => {
    const k = (e.category || e.description || '기타').trim();
    byCat[k] = (byCat[k]||0) + Number(e.amount||0);
  });

  // 계획에 적힌 분류 키워드를 자동으로 뽑아냄 — 카테고리 이름이 계획 본문에 등장하면 '계획에 있음'
  const planText = al._plan || '';
  const plannedCats = new Set(EXPENSE_CATEGORIES.filter(c => planText.includes(c)));
  const plannedTotal   = expense.filter(e => plannedCats.has(e.category)).reduce((s,e)=>s+Number(e.amount||0),0);
  const unplannedTotal = expense.filter(e => !plannedCats.has(e.category)).reduce((s,e)=>s+Number(e.amount||0),0);

  // 파이는 카테고리마다 다른 색으로 — 분류 구분이 핵심
  // 계획/계획밖 여부는 라벨 옆에 표시
  const expenseData = Object.entries(byCat)
    .sort((a,b)=>b[1]-a[1])
    .map(([label,value], i) => ({
      label: label + (plannedCats.has(label) ? ' ✓계획' : ' ⚠계획밖'),
      value,
      color: PIE_COLORS[i % PIE_COLORS.length],
    }));
  const expensePie = pieChart(expenseData);

  // 소비 생활 분석
  const lowNecExpenses = expense.filter(e => e.necessity > 0 && e.necessity <= 2);
  const wasteAmount = lowNecExpenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const ratedCount = expense.filter(e=>e.necessity>0).length;
  const avgNec = ratedCount > 0
    ? (expense.filter(e=>e.necessity>0).reduce((s,e)=>s+e.necessity,0) / ratedCount).toFixed(1)
    : '-';

  let advice = '';
  if (ratedCount === 0) {
    advice = '아직 지출에 별점을 매기지 않았어요. 다음 지출부터 "꼭 필요했는지" 별점으로 평가해 보세요.';
  } else if (lowNecExpenses.length === 0) {
    advice = `잘했어요! 별점 ${avgNec}점으로 꽤 알찬 소비를 했어요. 이 습관을 계속 이어가세요. ✨`;
  } else {
    advice = `별점 2점 이하 지출이 ${lowNecExpenses.length}건, 합계 ${fmtMoney(wasteAmount)}원이에요. 다음에는 사기 전에 "정말 필요한가?" 한 번 더 생각해 보면 좋겠어요.`;
  }

  root.innerHTML = `
    ${topBar(`
      <button class="btn btn-ghost" onclick="view.current='bankbook';render()">‹ 통장으로</button>
      <button class="btn btn-ghost" onclick="logout()">로그아웃</button>
    `)}
    <h1>용돈 결산</h1>
    <p style="text-align:center;color:var(--text-muted);letter-spacing:0.08em;">
      ${al.period.start && al.period.end
        ? `기간 <b style="color:var(--ink-navy);">${al.period.start} ~ ${al.period.end}</b>`
        : '기간이 설정되지 않았습니다'}
    </p>

    <div class="stat-grid" style="grid-template-columns: minmax(0, 1.4fr) minmax(0, 1.4fr) minmax(0, 1.4fr) minmax(0, 0.7fr);">
      <div class="stat-tile tile-income"><div class="num pos">＋${fmtMoney(totalIncome)}</div><div class="label">총 수입</div></div>
      <div class="stat-tile tile-expense"><div class="num neg">－${fmtMoney(totalExpense)}</div><div class="label">총 지출</div></div>
      <div class="stat-tile tile-balance"><div class="num" style="color:${balance>=0?'var(--ink-navy)':'var(--negative)'};">${fmtMoney(balance)}</div><div class="label">잔액</div></div>
      <div class="stat-tile tile-count"><div class="num">${inPeriod.length}</div><div class="label">사용 건수</div></div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:18px;margin-top:10px;">
      <div class="activity-card">
        <h2 style="margin-top:0;">이번 기간 수입</h2>
        <div class="row" style="gap:24px;margin-top:8px;">
          <div><div style="font-size:0.82em;color:var(--text-secondary);">정기 수입</div><div class="num pos" style="font-size:1.4em;">${fmtMoney(fixed)}원</div></div>
          <div><div style="font-size:0.82em;color:var(--text-secondary);">특별 수입</div><div class="num pos" style="font-size:1.4em;">${fmtMoney(special)}원</div></div>
        </div>
      </div>
      <div class="activity-card">
        <h2 style="margin-top:0;">수입과 지출 비교</h2>
        ${compareHTML}
      </div>
    </div>

    <h2 style="margin-top:18px;">지출 항목별 구성</h2>
    <div class="activity-card">
      ${expensePie}
    </div>

    <h2 style="margin-top:18px;">나의 소비 생활 분석</h2>
    <div class="activity-card">
      <!-- 1단계: 처음 세운 지출 계획 -->
      ${al._plan
        ? `<div style="padding:14px 16px;background:var(--primary-soft);border-radius:var(--radius-sm);">
             <b style="color:var(--primary);">① 내가 처음 세운 지출 계획</b>
             <p style="margin-top:6px;white-space:pre-wrap;color:var(--text);">${escapeHTML(al._plan)}</p>
           </div>`
        : `<div style="padding:14px 16px;background:var(--bg-soft);border-radius:var(--radius-sm);color:var(--text-muted);">
             <b>① 지출 계획</b><br>아직 지출 계획을 적지 않았어요. <b>기간 · 지출 계획 변경</b>에서 적어보세요.
           </div>`}

      <!-- 2단계: 계획대로 쓴 것 vs 계획 밖에 쓴 것 -->
      <div style="margin-top:14px;padding:14px 16px;background:var(--bg-soft);border-radius:var(--radius-sm);">
        <b style="color:var(--text);">② 실제로 사용한 내역 — 계획대로 쓴 것 vs 계획 밖에 쓴 것</b>
        ${Object.keys(byCat).length === 0
          ? `<p style="margin-top:6px;color:var(--text-muted);">아직 지출 기록이 없어요.</p>`
          : `
            <div class="row" style="gap:16px;flex-wrap:wrap;margin-top:10px;">
              <div style="background:#E4F8F3;border:1px solid #5BDDC0;padding:10px 14px;border-radius:10px;flex:1;min-width:180px;">
                <div style="font-size:0.85em;color:#1f5a36;font-weight:700;">✓ 계획대로 쓴 돈</div>
                <div class="num" style="font-size:1.35em;font-weight:800;color:#1f5a36;">-${fmtMoney(plannedTotal)}원</div>
              </div>
              <div style="background:#FFE9D7;border:1px solid #F4A35C;padding:10px 14px;border-radius:10px;flex:1;min-width:180px;">
                <div style="font-size:0.85em;color:#a65500;font-weight:700;">! 계획 밖에 쓴 돈</div>
                <div class="num" style="font-size:1.35em;font-weight:800;color:#a65500;">-${fmtMoney(unplannedTotal)}원</div>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-top:14px;">
              ${Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([cat,val]) => {
                const planned = plannedCats.has(cat);
                return `
                 <div style="background:${planned?'#E4F8F3':'#FFE9D7'};padding:10px 12px;border-radius:8px;border:1px solid ${planned?'#5BDDC0':'#F4A35C'};">
                   <div style="font-size:0.82em;color:${planned?'#1f5a36':'#a65500'};font-weight:600;">
                     ${escapeHTML(cat)} <span style="font-size:0.8em;opacity:0.85;">${planned?'· 계획':'· 계획 밖'}</span>
                   </div>
                   <div class="num" style="font-size:1.1em;font-weight:700;color:${planned?'#1f5a36':'#a65500'};">-${fmtMoney(val)}원</div>
                 </div>`;
              }).join('')}
            </div>
            <p style="margin-top:10px;font-size:0.88em;color:var(--text-secondary);">초록은 처음 계획에 있던 분류, 주황은 계획에 없었던 분류예요.</p>`}
      </div>

      <!-- 3단계: 한 줄 조언 + 지출 평균 별점 나란히 -->
      <div class="row" style="gap:14px;align-items:stretch;margin-top:14px;flex-wrap:wrap;">
        <div style="flex:3;min-width:260px;padding:14px 16px;background:#FFF8E1;border:1px solid #F2B860;border-radius:var(--radius-sm);color:#7a5b0d;line-height:1.6;word-break:keep-all;overflow-wrap:break-word;">
          <b>③ 한 줄 조언</b><br>${advice}
        </div>
        <div style="flex:1;min-width:140px;padding:14px 16px;background:white;border:1px solid var(--border);border-radius:var(--radius-sm);text-align:center;display:flex;flex-direction:column;justify-content:center;">
          <div style="font-size:0.82em;color:var(--text-secondary);">지출 평균 별점</div>
          <div class="num" style="font-size:1.8em;font-weight:800;color:var(--text);">${avgNec}</div>
          <div style="font-size:0.78em;color:var(--text-muted);">5점 만점</div>
        </div>
      </div>

      <!-- 4단계: 내 생각과 다음 계획 적용 -->
      <div style="margin-top:14px;padding:14px 16px;background:#F3F5F8;border:1px dashed #9AB0CC;border-radius:var(--radius-sm);">
        <b style="color:var(--primary-deep);">④ 한 줄 조언에 대한 내 생각 · 다음 계획에 적용할 것</b>
        <textarea class="input" id="reflectionInput" rows="3" placeholder="예) 간식에 너무 많이 썼다. 다음에는 일주일에 한 번만 사기로 하자. 게임 아이템은 다음 계획에서 빼야겠다." style="width:100%;margin-top:8px;resize:vertical;word-break:keep-all;overflow-wrap:break-word;line-height:1.6;">${escapeHTML(al._reflection || '')}</textarea>
        <div class="row" style="justify-content:flex-end;margin-top:8px;">
          <button class="btn btn-primary btn-sm" onclick="saveReflection()">저장하기</button>
        </div>
      </div>
    </div>
  `;
}

function escapeHTML(s) {
  return String(s ?? '').replace(/[&<>"']/g, ch => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[ch]));
}
function escapeAttr(s) { return escapeHTML(s); }

    </div>`;
}

// 선생님 작업은 모두 스프레드시트에서 처리합니다 — 앱에는 학생 화면만 노출.
// (도장 찍기·설정 변경·통계 보기·공통 활동 모두 시트에서 직접)

(async () => {
  renderLoading();

  // 로컬(file://)·정적 호스팅이면 즉시 샘플 로드. google.script 가
  // 늦게 주입되는 케이스만 짧게 폴링 (Apps Script 같은 신호가 있을 때만).
  const hasGoogleStub = (typeof google !== 'undefined');
  if (hasGoogleStub) await waitForAppsScript();

  if (!inAppsScript()) {
    console.info('[로컬 미리보기] Apps Script 가 감지되지 않아 샘플 데이터를 로드합니다.');
    loadSampleData();
    console.info('[로컬 미리보기] 명단:', state.roster.map(r => r.name).join(', '));
    state.loading = false;
    render();
    return;
  }

  // 시트 연결이 끊겨도 메타 정보(연결 오류 상세)는 받아둬야 선생님이 진단할 수 있음.
  // Promise.allSettled 로 각 호출의 성공/실패를 독립적으로 처리한다.
  const results = await Promise.allSettled([
    callGSRetry('getMeta'),
    callGSRetry('getRoster'),
    callGSRetry('getTeacherPassword'),
    callGSRetry('getSettings'),
  ]);
  const [metaR, rosterR, pwR, settingsR] = results;
  if (metaR.status === 'fulfilled') state.meta = metaR.value;
  else state.meta = { ok:false, error: metaR.reason && metaR.reason.message || String(metaR.reason) };
  if (rosterR.status === 'fulfilled') state.roster = rosterR.value || [];
  if (pwR.status === 'fulfilled') state.teacherPassword = pwR.value || '1234';
  if (settingsR.status === 'fulfilled') {
    state.settings = settingsR.value || state.settings;
    state.bankName = state.settings.bankName || '우리반은행';
  }
  results.forEach((r, i) => {
    if (r.status === 'rejected') console.error('initial load[' + i + '] failed:', r.reason);
  });

  state.loading = false;
  state.apiReady = true;
  render();
})();
</script>
